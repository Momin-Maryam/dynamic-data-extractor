<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Configurable Data Extractor</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <h1>Data Extractor</h1>

    <div class="add-field-section">
      <input type="text" id="fieldName" placeholder="Field name (e.g. Title)" />
      <input type="text" id="fieldSelector" placeholder="CSS selector (e.g. .price_color)" />
      <select id="fieldType">
        <option value="text">Text</option>
        <option value="link">Link (href)</option>
        <option value="image">Image (src)</option>
        <option value="attribute">Attribute</option>
        <option value="html">HTML</option>
        <option value="table">Table</option>
      </select>
      <input type="text" id="fieldAttributeName" placeholder="Attribute name (e.g. data-id)" style="display: none;" />
      <button id="pickElementBtn" type="button">Pick Element on Page</button>
      <button id="addFieldBtn">Add Field</button>
    </div>

    <ul id="fieldList" class="field-list">
      <!-- Added fields will appear here dynamically -->
    </ul>

    <div class="pagination-section">
      <input type="text" id="nextPageSelector" placeholder="Next page selector (optional, e.g. .next a)" />
      <input type="number" id="maxPages" placeholder="Max pages" value="5" min="1" max="100" />
      <button id="scrapeBtn" type="button">Scrape All Pages</button>
    </div>

    <div class="actions">
      <button id="extractBtn">Extract Data</button>
      <button id="exportBtn">Export CSV</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
